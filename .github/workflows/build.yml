name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        # When the release-key secrets are configured on the repo, decode them
        # so the debug APK is signed with the owner's real key instead of the
        # committed project-local debug key. Every APK (CI debug, CI release,
        # local installDebug) then shares one signature and installs over any
        # other on the device. Missing secrets silently fall back to the
        # committed debug key.
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_STORE_PASSWORD" ] \
              && [ -n "$KEYSTORE_KEY_ALIAS" ] && [ -n "$KEYSTORE_KEY_PASSWORD" ]; then
            mkdir -p "$RUNNER_TEMP/keystore"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/release.keystore"
            cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/keystore/release.keystore
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF
            echo "Debug APK will be signed with the release key."
          else
            echo "Release secrets not set; falling back to the committed debug key."
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Cleanup signing material
        if: always()
        run: |
          rm -f keystore.properties
          rm -rf "$RUNNER_TEMP/keystore"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: monotrypt-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
