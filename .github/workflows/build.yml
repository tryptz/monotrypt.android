name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: monotrypt-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
