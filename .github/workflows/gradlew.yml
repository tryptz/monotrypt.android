name: Gradle CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      task:
        description: 'Gradle task to run (e.g. assembleDebug, lint, test)'
        required: false
        default: 'assembleDebug'

concurrency:
  group: gradle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 14
          if-no-files-found: ignore

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        # See build.yml — if the owner's release-key secrets exist, sign with
        # them so the CI debug APK matches local + release signatures.
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_STORE_PASSWORD" ] \
              && [ -n "$KEYSTORE_KEY_ALIAS" ] && [ -n "$KEYSTORE_KEY_PASSWORD" ]; then
            mkdir -p "$RUNNER_TEMP/keystore"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/release.keystore"
            cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/keystore/release.keystore
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF
            echo "APK will be signed with the release key."
          else
            echo "Release secrets not set; falling back to the committed debug key."
          fi

      - name: Run Gradle task
        run: ./gradlew ${{ github.event.inputs.task || 'assembleDebug' }} --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monotrypt-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup signing material
        if: always()
        run: |
          rm -f keystore.properties
          rm -rf "$RUNNER_TEMP/keystore"
