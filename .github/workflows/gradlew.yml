name: Gradle CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      task:
        description: 'Gradle task to run (e.g. assembleDebug, lint, test)'
        required: false
        default: 'assembleDebug'

concurrency:
  group: gradle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        id: run_lint
        run: ./gradlew lintDebug --stacktrace 2>&1 | tee gradle-lint.log

      - name: Summarize lint failure
        if: failure()
        run: |
          echo "::group::Gradle lint failure tail"
          tail -n 200 gradle-lint.log | tee -a "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
          first=$(grep -E -m 1 "^e: |FAILURE:|error:|Unresolved reference|Execution failed" gradle-lint.log || true)
          if [ -n "$first" ]; then
            echo "::error::$first"
          fi

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            gradle-lint.log
          retention-days: 14
          if-no-files-found: ignore

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        id: run_tests
        run: ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee gradle-test.log
        # `set -o pipefail` inherits from the runner's bash config, so the tee
        # above still propagates gradle's exit status.

      - name: Summarize failure
        if: failure()
        run: |
          echo "::group::Gradle test failure tail"
          tail -n 200 gradle-test.log | tee -a "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
          # Extract and re-echo the first real error line as a workflow error
          # annotation — that surfaces into the PR check UI where we can read
          # it without drilling into the full log.
          first=$(grep -E -m 1 "^e: |FAILURE:|error:|Unresolved reference|Execution failed" gradle-test.log || true)
          if [ -n "$first" ]; then
            echo "::error::$first"
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            app/build/reports/tests/testDebugUnitTest
            gradle-test.log
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules with retry
        shell: bash
        run: |
          attempts=0
          max_attempts=5
          until git submodule update --init --recursive --jobs 4; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Submodule init failed after $max_attempts attempts"
              exit 1
            fi
            delay=$((5 * attempts))
            echo "::warning::Submodule init failed (attempt $attempts/$max_attempts); retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Gradle task
        id: run_build
        run: ./gradlew ${{ github.event.inputs.task || 'assembleDebug' }} --stacktrace 2>&1 | tee gradle-build.log

      - name: Summarize build failure
        if: failure()
        run: |
          echo "::group::Gradle build failure tail"
          tail -n 200 gradle-build.log | tee -a "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
          first=$(grep -E -m 1 "^e: |FAILURE:|error:|Unresolved reference|Execution failed|CMake Error|ndk-build" gradle-build.log || true)
          if [ -n "$first" ]; then
            echo "::error::$first"
          fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monotrypt-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: gradle-build.log
          retention-days: 14
          if-no-files-found: ignore
